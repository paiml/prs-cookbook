<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="sceneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="widgetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="resourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="bindingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="themeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="permGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="exprGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="700" fill="url(#grid)"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="80" text-anchor="middle" fill="#06b6d4" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" filter="url(#glow)">PRS COOKBOOK</text>
  <text x="600" y="115" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="18">Isolated, Idempotent, Useful &amp; Reproducible Scene Recipes</text>

  <!-- Recipe Cards - Row 1 -->

  <!-- Scene Creation -->
  <g transform="translate(80, 160)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#06b6d4" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#sceneGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#sceneGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">📐 SCENE CREATION</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Grid / Flex / Absolute</text>
    <text x="15" y="78" fill="#67e8f9" font-family="monospace" font-size="10">✓ Nested layouts</text>
    <text x="15" y="96" fill="#67e8f9" font-family="monospace" font-size="10">✓ Declarative YAML</text>
  </g>

  <!-- Widget Config -->
  <g transform="translate(300, 160)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#widgetGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#widgetGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🎛️ WIDGETS</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Input / Charts / Tables</text>
    <text x="15" y="78" fill="#c4b5fd" font-family="monospace" font-size="10">✓ Type-safe config</text>
    <text x="15" y="96" fill="#c4b5fd" font-family="monospace" font-size="10">✓ Validation rules</text>
  </g>

  <!-- Resources -->
  <g transform="translate(520, 160)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#f97316" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#resourceGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#resourceGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">📦 RESOURCES</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Models / Datasets</text>
    <text x="15" y="78" fill="#fdba74" font-family="monospace" font-size="10">✓ BLAKE3 verification</text>
    <text x="15" y="96" fill="#fdba74" font-family="monospace" font-size="10">✓ Fallback sources</text>
  </g>

  <!-- Bindings -->
  <g transform="translate(740, 160)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#10b981" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#bindingGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#bindingGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🔗 BINDINGS</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Events → Actions</text>
    <text x="15" y="78" fill="#6ee7b7" font-family="monospace" font-size="10">✓ Debounce support</text>
    <text x="15" y="96" fill="#6ee7b7" font-family="monospace" font-size="10">✓ Conditional logic</text>
  </g>

  <!-- Theme -->
  <g transform="translate(960, 160)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#ec4899" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#themeGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#themeGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🎨 THEMING</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Dark / Light presets</text>
    <text x="15" y="78" fill="#f9a8d4" font-family="monospace" font-size="10">✓ Custom colors</text>
    <text x="15" y="96" fill="#f9a8d4" font-family="monospace" font-size="10">✓ Typography</text>
  </g>

  <!-- Recipe Cards - Row 2 -->

  <!-- Permissions -->
  <g transform="translate(190, 310)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#ef4444" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#permGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#permGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🔐 PERMISSIONS</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Network / Filesystem</text>
    <text x="15" y="78" fill="#fca5a5" font-family="monospace" font-size="10">✓ Least privilege</text>
    <text x="15" y="96" fill="#fca5a5" font-family="monospace" font-size="10">✓ Glob patterns</text>
  </g>

  <!-- Expressions -->
  <g transform="translate(410, 310)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#3b82f6" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#exprGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#exprGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">⚡ EXPRESSIONS</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">{{ data | transform }}</text>
    <text x="15" y="78" fill="#93c5fd" font-family="monospace" font-size="10">✓ Filter / Sort</text>
    <text x="15" y="96" fill="#93c5fd" font-family="monospace" font-size="10">✓ Aggregation</text>
  </g>

  <!-- WASM Ready -->
  <g transform="translate(630, 310)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#06b6d4" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#sceneGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#sceneGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🌐 WASM READY</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Browser deployment</text>
    <text x="15" y="78" fill="#67e8f9" font-family="monospace" font-size="10">✓ No Python runtime</text>
    <text x="15" y="96" fill="#67e8f9" font-family="monospace" font-size="10">✓ 60fps rendering</text>
  </g>

  <!-- IIUR -->
  <g transform="translate(850, 310)">
    <rect width="200" height="120" rx="12" fill="#21262d" stroke="#10b981" stroke-width="2"/>
    <rect width="200" height="35" rx="12" fill="url(#bindingGrad)"/>
    <rect x="0" y="23" width="200" height="12" fill="url(#bindingGrad)"/>
    <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🎯 IIUR</text>
    <text x="15" y="60" fill="#9ca3af" font-family="monospace" font-size="10">Toyota Way principles</text>
    <text x="15" y="78" fill="#6ee7b7" font-family="monospace" font-size="10">✓ Zero side effects</text>
    <text x="15" y="96" fill="#6ee7b7" font-family="monospace" font-size="10">✓ Deterministic</text>
  </g>

  <!-- Sovereign Stack Integration -->
  <g transform="translate(100, 470)">
    <rect width="1000" height="100" rx="12" fill="#21262d" stroke="#374151" stroke-width="1"/>
    <text x="500" y="30" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">PRESENTAR ECOSYSTEM</text>

    <!-- trueno -->
    <g transform="translate(50, 45)">
      <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
      <text x="60" y="26" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">trueno</text>
    </g>
    <text x="190" y="72" fill="#6b7280" font-family="system-ui" font-size="20">→</text>

    <!-- aprender -->
    <g transform="translate(210, 45)">
      <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
      <text x="60" y="26" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold">aprender</text>
    </g>
    <text x="350" y="72" fill="#6b7280" font-family="system-ui" font-size="20">→</text>

    <!-- presentar -->
    <g transform="translate(370, 45)">
      <rect width="120" height="40" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
      <text x="60" y="26" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="12" font-weight="bold">presentar</text>
    </g>
    <text x="510" y="72" fill="#6b7280" font-family="system-ui" font-size="20">→</text>

    <!-- prs-cookbook -->
    <g transform="translate(530, 45)">
      <rect width="160" height="40" rx="8" fill="#1f2937" stroke="#06b6d4" stroke-width="2"/>
      <text x="80" y="26" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="12" font-weight="bold">prs-cookbook</text>
    </g>
    <text x="710" y="72" fill="#6b7280" font-family="system-ui" font-size="20">→</text>

    <!-- Production -->
    <g transform="translate(730, 45)">
      <rect width="220" height="40" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
      <text x="110" y="26" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">🚀 Visualization Apps</text>
    </g>
  </g>

  <!-- CLI Example -->
  <g transform="translate(100, 590)">
    <rect width="480" height="70" rx="12" fill="#0d1117" stroke="#374151" stroke-width="1"/>
    <text x="20" y="25" fill="#6b7280" font-family="monospace" font-size="11">$</text>
    <text x="35" y="25" fill="#06b6d4" font-family="monospace" font-size="11">cargo run --example</text>
    <text x="200" y="25" fill="#9ca3af" font-family="monospace" font-size="11">create_minimal_scene</text>
    <text x="20" y="50" fill="#6b7280" font-family="monospace" font-size="11">$</text>
    <text x="35" y="50" fill="#06b6d4" font-family="monospace" font-size="11">cargo test</text>
    <text x="120" y="50" fill="#10b981" font-family="monospace" font-size="11">48 passed</text>
    <text x="200" y="50" fill="#6b7280" font-family="monospace" font-size="11"># proptest + unit tests</text>
  </g>

  <!-- Stats -->
  <g transform="translate(620, 590)">
    <rect width="480" height="70" rx="12" fill="#21262d" stroke="#374151" stroke-width="1"/>
    <text x="60" y="30" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">Examples</text>
    <text x="60" y="50" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="16" font-weight="bold">27</text>

    <text x="160" y="30" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">Categories</text>
    <text x="160" y="50" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="16" font-weight="bold">A-G</text>

    <text x="260" y="30" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">Pure Rust</text>
    <text x="260" y="50" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="16" font-weight="bold">100%</text>

    <text x="360" y="30" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">Proptests</text>
    <text x="360" y="50" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold">7</text>

    <text x="440" y="30" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">MSRV</text>
    <text x="440" y="50" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="16" font-weight="bold">1.75</text>
  </g>
</svg>
